services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile

    container_name: fintrack-backend

    working_dir: /var/www

    tty: true

    volumes:
      - ./backend:/var/www
  mysql:
    image: mysql:8.4

    container_name: fintrack-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: fintrack
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: fintrack
      MYSQL_PASSWORD: secret

    ports:
      - '3306:3306'

    volumes:
      - mysql_data:/var/lib/mysql

  nginx:
    image: nginx:latest

    container_name: fintrack-nginx

    ports:
      - '8000:80'

    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - backend

volumes:
  mysql_data:
